<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Auto-redirect returning visitors instantly before parsing body or assets
    (function () {
      try {
        var c = localStorage.getItem('cc_country');
        if ((c === 'ca' || c === 'us') && !location.search.includes('stay')) {
          location.replace(c + '/');
        }
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chen Chen's Nashville Hot Chicken | Choose Your Country</title>
  <meta name="description" content="Chen Chen's Nashville Hot Chicken — bold Southern heat with a chef-driven Asian twist. Nashville hot chicken served in Toronto and the USA. Choose your country.">

  <!-- Hreflang -->
  <link rel="alternate" hreflang="en-ca" href="https://www.chenchenshotchicken.com/ca/">
  <link rel="alternate" hreflang="en-us" href="https://www.chenchenshotchicken.com/us/">
  <link rel="alternate" hreflang="x-default" href="https://www.chenchenshotchicken.com/">

  <!-- OG / Social -->
  <meta property="og:title" content="Chen Chen's Nashville Hot Chicken">
  <meta property="og:description" content="Bold Southern heat with a chef-driven Asian twist. Ranked #1 on Yelp Canada. Choose your country to order.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.chenchenshotchicken.com/">
  <meta property="og:image" content="https://www.chenchenshotchicken.com/assets/hero_chicken.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── Base Reset ────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #1A1714;
      background: #FBF7F2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ── Gradient text helper ── */
    .gradient-text {
      background: linear-gradient(135deg, #D42B2B, #FF6B35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }

    /* ── Gateway Styles ── */
    body.gateway {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem clamp(1rem, 4vw, 2rem);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      background: #1A1714;
      color: #FBF7F2;
    }

    body.gateway::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 43, 43, .1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .gateway__logo {
      height: 160px;
      width: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 30px rgba(212, 43, 43, .3));
      animation: gateway-logo 1s cubic-bezier(.4, 0, .2, 1) forwards;
      position: relative;
      z-index: 1;
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
    }
    .gateway__logo:hover { transform: scale(1.03) rotate(-1deg); }

    @keyframes gateway-logo {
      from { transform: scale(.7) rotate(-8deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }

    .gateway__title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      text-align: center;
      margin-bottom: .6rem;
      position: relative;
      z-index: 1;
      color: #FBF7F2;
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      letter-spacing: .02em;
    }

    .gateway__sub {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: #FF6B35;
      margin-bottom: 3rem;
      position: relative;
      z-index: 1;
    }

    .gateway__cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .gateway__card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #FBF7F2;
      text-decoration: none;
      border-radius: 32px;
      padding: 2.8rem 2.5rem;
      width: 280px;
      border: 1px solid rgba(255,255,255,.06);
      transition: all .35s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .gateway__card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      transition: background .18s cubic-bezier(.4, 0, .2, 1);
    }

    .gateway__card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,.1);
      box-shadow: 0 16px 48px rgba(26, 23, 20, .14);
    }

    .gateway__card--ca:hover::before { background: #D42B2B; }
    .gateway__card--ca:hover { box-shadow: 0 12px 40px rgba(212, 43, 43, .15); }
    .gateway__card--us:hover::before { background: #FF6B35; }
    .gateway__card--us:hover { box-shadow: 0 12px 40px rgba(255, 107, 53, .15); }

    .gateway__flag {
      font-size: 3.2rem;
      margin-bottom: 1rem;
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.3));
    }
    .gateway__card:hover .gateway__flag { transform: scale(1.15) rotate(3deg); }

    .gateway__card h2 {
      font-size: 1.4rem;
      margin-bottom: .5rem;
      color: #FBF7F2;
      font-family: 'Space Grotesk', sans-serif;
    }

    .gateway__card-sub {
      font-size: .88rem;
      color: #A39888;
      font-family: 'Space Grotesk', sans-serif;
    }

    .gateway__remember {
      margin-top: 2.5rem;
      font-size: .85rem;
      color: #A39888;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      cursor: pointer;
      user-select: none;
      background: rgba(255,255,255,.03);
      padding: .45rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.06);
      position: relative;
      z-index: 1;
      font-family: 'Space Grotesk', sans-serif;
    }

    .gateway__remember input {
      accent-color: #D42B2B;
      width: 15px;
      height: 15px;
    }

    @media (max-width: 480px) {
      .gateway__cards { flex-direction: column; align-items: center; }
      .gateway__card { width: 100%; max-width: 340px; }
    }
  </style>
</head>
<body class="gateway">

  <img class="gateway__logo" src="assets/logo_circle.png" alt="Chen Chen's Nashville Hot Chicken — fire-breathing chicken logo" width="320" height="320">

  <h1 class="gateway__title">Southern Heat.<br><span class="gradient-text">Asian Twist.</span></h1>
  <p class="gateway__sub">Choose your country</p>

  <div class="gateway__cards">
    <a class="gateway__card gateway__card--ca" href="ca/" id="cardCanada" onclick="rememberCountry('ca')">
      <h2>Canada</h2>
      <span class="gateway__card-sub">Toronto — The Well</span>
    </a>
    <a class="gateway__card gateway__card--us" href="us/" id="cardUS" onclick="rememberCountry('us')">
      <h2>United States</h2>
      <span class="gateway__card-sub">Coming Soon</span>
    </a>
  </div>

  <label class="gateway__remember" id="rememberLabel">
    <input type="checkbox" id="rememberCheck" checked>
    <span>Remember my choice</span>
  </label>

  <script>
    function rememberCountry(code) {
      if (document.getElementById('rememberCheck').checked) {
        try { localStorage.setItem('cc_country', code); } catch (e) {}
      } else {
        try { localStorage.removeItem('cc_country'); } catch (e) {}
      }
    }
  </script>
</body>
</html>
