<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Auto-redirect returning visitors instantly before parsing body or assets
    (function () {
      try {
        var c = localStorage.getItem('cc_country');
        if ((c === 'ca' || c === 'us') && !location.search.includes('stay')) {
          location.replace(c + '/');
        }
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chen Chen's Nashville Hot Chicken | Choose Your Country</title>
  <meta name="description" content="Chen Chen's Nashville Hot Chicken — bold Southern heat with a chef-driven Asian twist. Nashville hot chicken served in Toronto and the USA. Choose your country.">

  <!-- Hreflang -->
  <link rel="alternate" hreflang="en-ca" href="https://www.chenchenshotchicken.com/ca/">
  <link rel="alternate" hreflang="en-us" href="https://www.chenchenshotchicken.com/us/">
  <link rel="alternate" hreflang="x-default" href="https://www.chenchenshotchicken.com/">

  <!-- OG / Social -->
  <meta property="og:title" content="Chen Chen's Nashville Hot Chicken">
  <meta property="og:description" content="Bold Southern heat with a chef-driven Asian twist. Ranked #1 on Yelp Canada. Choose your country to order.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.chenchenshotchicken.com/">
  <meta property="og:image" content="https://www.chenchenshotchicken.com/assets/hero_combo.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-paper:        #F5F1E5;
      --charcoal:        #151515;
      --charcoal-light:  #252525;
      --blood-red:       #D82A1B;
      --mustard-yellow:  #FDCF09;
      --white:           #FFFFFF;
      --font-display:    'Bebas Neue', 'Impact', sans-serif;
      --font-body:       'Inter', system-ui, sans-serif;
      --border-thick:    3px solid var(--charcoal);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      -webkit-text-size-adjust: 100%;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-paper);
      overflow-x: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Split Layout ── */
    .split-layout {
      display: flex;
      flex: 1;
      width: 100%;
    }

    .split-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      position: relative;
      transition: all 0.4s cubic-bezier(.4, 0, .2, 1);
      cursor: pointer;
      overflow: hidden;
    }

    /* Inner outline on hover */
    .split-panel::after {
      content: '';
      position: absolute;
      inset: 1rem;
      border: 8px solid transparent;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .split-panel:hover::after {
      inset: 2rem;
    }

    /* Left Panel (CA) */
    .split-panel--ca {
      background: var(--bg-paper);
      color: var(--charcoal);
    }
    .split-panel--ca:hover {
      background: var(--blood-red);
      color: var(--bg-paper);
    }
    .split-panel--ca:hover::after {
      border-color: var(--bg-paper);
    }

    /* Right Panel (US) */
    .split-panel--us {
      background: var(--charcoal);
      color: var(--bg-paper);
    }
    .split-panel--us:hover {
      background: var(--mustard-yellow);
      color: var(--charcoal);
    }
    .split-panel--us:hover::after {
      border-color: var(--charcoal);
    }

    /* Center Logo */
    .center-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      z-index: 10;
      pointer-events: none;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
      transition: transform 0.5s cubic-bezier(.4, 0, .2, 1);
    }

    /* Make logo slightly pop when either panel is hovered */
    .split-layout:hover .center-logo {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .panel-content {
      text-align: center;
      z-index: 2;
      transition: transform 0.3s ease;
    }

    .split-panel:hover .panel-content {
      transform: scale(1.1);
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.9;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .panel-sub {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Toggle Switch */
    .remember-bar {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--charcoal);
      color: var(--bg-paper);
      padding: 0.8rem 1.5rem;
      border: 3px solid var(--mustard-yellow);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      box-shadow: 4px 4px 0 var(--mustard-yellow);
      cursor: pointer;
      transition: 0.2s;
    }

    .remember-bar:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 6px 6px 0 var(--mustard-yellow);
    }

    .remember-bar input[type="checkbox"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid var(--mustard-yellow);
      background: transparent;
      cursor: pointer;
      position: relative;
    }

    .remember-bar input[type="checkbox"]:checked {
      background: var(--mustard-yellow);
    }
    
    .remember-bar input[type="checkbox"]:checked::after {
      content: 'X';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--charcoal);
      font-family: var(--font-display);
      font-size: 1.2rem;
    }

    @media (max-width: 900px) {
      .split-layout {
        flex-direction: column;
      }
      .center-logo {
        width: 200px;
        height: 200px;
      }
      .remember-bar {
        bottom: 1rem;
      }
    }
  </style>
</head>
<body>

  <img class="center-logo" src="assets/logo_circle.png" alt="Chen Chen's Nashville Hot Chicken">

  <div class="split-layout">
    <a class="split-panel split-panel--ca" href="ca/" id="cardCanada" onclick="rememberCountry('ca')">
      <div class="panel-content">
        <h1 class="panel-title">Canada</h1>
        <div class="panel-sub">Toronto — The Well</div>
      </div>
    </a>
    
    <a class="split-panel split-panel--us" href="us/" id="cardUS" onclick="rememberCountry('us')">
      <div class="panel-content">
        <h1 class="panel-title">USA</h1>
        <div class="panel-sub">Coming Soon</div>
      </div>
    </a>
  </div>

  <label class="remember-bar">
    <input type="checkbox" id="rememberCheck" checked>
    <span>Remember my choice</span>
  </label>

  <script>
    function rememberCountry(code) {
      if (document.getElementById('rememberCheck').checked) {
        try { localStorage.setItem('cc_country', code); } catch (e) {}
      } else {
        try { localStorage.removeItem('cc_country'); } catch (e) {}
      }
    }
  </script>
</body>
</html>
